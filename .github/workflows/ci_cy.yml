name: Cypress Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  cypress-run:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          config-file: cypress.ci.config.js
          browser: chrome
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_allure: true

      - name: Generate Allure report
        if: always()
        run: npm run allure:report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      - name: Upload Allure report to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4

      - name: Add Allure link to Summary
        if: always()
        run: |
          echo "## Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Allure Report: https://pashadnipro-ws.github.io/cypress/" >> $GITHUB_STEP_SUMMARY
          echo "- Cypress Cloud: available in run summary above" >> $GITHUB_STEP_SUMMARY